name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Restore release keystore
        env:
          ROMMIO_RELEASE_KEYSTORE_BASE64: ${{ secrets.ROMMIO_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "${ROMMIO_RELEASE_KEYSTORE_BASE64:-}" ]; then
            echo "$ROMMIO_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/rommio-release.keystore"
            echo "ROMMIO_RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/rommio-release.keystore" >> "$GITHUB_ENV"
          fi

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          ROMMIO_RELEASE_KEYSTORE_PATH: ${{ env.ROMMIO_RELEASE_KEYSTORE_PATH }}
          ROMMIO_RELEASE_STORE_PASSWORD: ${{ secrets.ROMMIO_RELEASE_STORE_PASSWORD }}
          ROMMIO_RELEASE_KEY_ALIAS: ${{ secrets.ROMMIO_RELEASE_KEY_ALIAS }}
          ROMMIO_RELEASE_KEY_PASSWORD: ${{ secrets.ROMMIO_RELEASE_KEY_PASSWORD }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: rommio-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
